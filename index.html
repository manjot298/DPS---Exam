<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Examination Portal - DPS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        .top-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 20px; text-align: center; }
        .field { display: flex; flex-direction: column; font-weight: bold; color: #34495e; }
        input { padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        .question-box { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #3498db; }
        .options { display: flex; justify-content: space-around; margin-top: 10px; }
        .submit-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center;">Student Information</h2>
        <div class="top-fields">
            <div class="field">Name: <input type="text" id="name"></div>
            <div class="field">Class: <input type="text" id="class"></div>
            <div class="field">DOB: <input type="date" id="date"></div>
            <div class="field">Father's Name: <input type="text" id="father"></div>
        </div>
        <div id="quiz-area"></div>
        <button class="submit-btn" onclick="submitExam()">Submit Exam</button>
    </div>

    <script src="questions.js"></script>
    <script>
        let quizItems = [];
        function init() {
            const lines = quizSource.split('\n').filter(l => l.trim() !== "");
            quizItems = lines.map(line => {
                const p = line.split('|');
                return { q: p[0], opts: [p[1], p[2], p[3]], ans: parseInt(p[4]) };
            });
            const container = document.getElementById('quiz-area');
            quizItems.forEach((item, i) => {
                container.innerHTML += `<div class="question-box"><div><b>${i+1}. ${item.q}</b></div>
                <div class="options">${item.opts.map((opt, oi) => `<label><input type="checkbox" class="q-${i}" onclick="onlyOne(this, ${i})"> ${opt}</label>`).join('')}</div></div>`;
            });
        }
        function onlyOne(cb, i) { document.querySelectorAll(`.q-${i}`).forEach(x => { if (x !== cb) x.checked = false; }); }

        function submitExam() {
            const info = { name: document.getElementById('name').value, class: document.getElementById('class').value, date: document.getElementById('date').value, father: document.getElementById('father').value };
            if (Object.values(info).some(v => v === "")) return alert("Please fill all info!");

            let score = 0;
            let userAnswers = []; 
            quizItems.forEach((item, i) => {
                const sel = Array.from(document.querySelectorAll(`.q-${i}`)).findIndex(c => c.checked);
                userAnswers.push(sel);
                if (sel === item.ans) score++;
            });

            let records = JSON.parse(localStorage.getItem('master_records')) || [];
            records.push({...info, score, total: quizItems.length, userAnswers});
            localStorage.setItem('master_records', JSON.stringify(records));

            const params = new URLSearchParams({...info, score, total: quizItems.length});
            window.location.href = "result.html?" + params.toString();
        }
        init();
    </script>
</body>
</html>
